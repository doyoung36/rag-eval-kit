services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: rag-pgvector
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-rag}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-rag}
      POSTGRES_DB: ${PGVECTOR_DB:-ragdb}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-rag} -d ${PGVECTOR_DB:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST / HTTP
      - "${QDRANT_GRPC_PORT:-6334}:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: rag-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ragpassword}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt driver
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 주피터 서버 (opt-in) — 기본 `up`에는 안 뜨고, `--profile notebook`일 때만 실행.
  #   docker compose --profile notebook up -d   →  http://localhost:8888
  # DB는 서비스명으로, Ollama는 호스트(host.docker.internal)로 접속한다.
  notebook:
    profiles: ["notebook"]
    build: .
    container_name: rag-notebook
    environment:
      PGVECTOR_HOST: pgvector
      PGVECTOR_USER: ${PGVECTOR_USER:-rag}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD:-rag}
      PGVECTOR_DB: ${PGVECTOR_DB:-ragdb}
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ragpassword}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8888:8888"
    volumes:
      - ./:/app          # 라이브 코드/노트북 마운트 (결과물은 호스트에 영속)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      pgvector:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy

volumes:
  pgvector_data:
  qdrant_data:
  neo4j_data:
