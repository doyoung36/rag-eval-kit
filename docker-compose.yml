services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: rag-pgvector
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-rag}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-rag}
      POSTGRES_DB: ${PGVECTOR_DB:-ragdb}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-rag} -d ${PGVECTOR_DB:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST / HTTP
      - "${QDRANT_GRPC_PORT:-6334}:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: rag-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ragpassword}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt driver
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
  qdrant_data:
  neo4j_data:
